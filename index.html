<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キッズおこづかい帳</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #ffa07c;
            --primary-light: #ffebe3;
            --secondary: #4ecdc4;
            --accent: #ff6b6b;
            --bg: #fff9e8;
            --text: #4a4a4a;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px var(--primary-light);
            margin-bottom: 5px;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--text);
            margin-bottom: 15px;
            border-bottom: 3px dashed var(--primary);
            padding-bottom: 5px;
        }

        h3 {
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--text);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 4px 4px 0px var(--text);
        }

        /* フォーム要素 */
        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--text);
            border-radius: 10px;
            font-size: 1rem;
            background: #fff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-dynamic {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }

        /* ボタン */
        button {
            background-color: var(--secondary);
            color: white;
            border: 2px solid var(--text);
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--text);
            transition: transform 0.1s;
            width: 100%;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        button:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--text);
        }

        button.btn-accent { background-color: var(--accent); }
        button.btn-primary { background-color: var(--primary); }

        /* 子供たちのステータスカード */
        .child-status {
            background: var(--primary-light);
            border: 2px solid var(--text);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }
        .child-name-display { font-weight: bold; font-size: 1.1rem; }
        .child-money { font-size: 1.3rem; color: var(--accent); font-weight: bold; margin-top: 5px;}

        /* お手伝い・支出設定のリスト */
        .settings-list {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            border-bottom: 1px #4a4a4a solid;
            font-size: 0.9rem;
        }

        /* 履歴テーブル */
        .history-list {
            max-height: 250px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .history-item {
            padding: 8px 6px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .history-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .danger-zone {
            margin-top: 40px;
            text-align: center;
        }
        .btn-clear {
            background: #95a5a6;
            font-size: 0.8rem;
            width: auto;
            display: inline-block;
        }

        /* タブ切り替え */
        .tab-container {
            display: flex;
            margin-bottom: 10px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #ddd;
            border: 2px solid var(--text);
            cursor: pointer;
            font-weight: bold;
            border-radius: 10px 10px 0 0;
        }
        .tab.active {
            background: var(--card-bg);
            border-bottom: none;
        }

        /* ローディング表示用 */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.2rem; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">データをよみこみ中...</div>

    <header>
        <h1>ジブンでおこづかい帳</h1>
        <p>〜 お手伝いでザクザク貯めよう！ 〜</p>
    </header>

    <div class="card">
        <h2>みんなのちょきんばこ</h2>
        <div class="grid-dynamic" id="kids-status-container"></div>
    </div>

    <div class="card">
        <div class="tab-container">
            <div class="tab active" id="tab-earn" onclick="switchMode('earn')">お手伝いした！</div>
            <div class="tab" id="tab-spend" onclick="switchMode('spend')">つかった…</div>
        </div>

        <form id="action-form" onsubmit="saveLog(event)">
            <div class="form-group">
                <label for="select-child">だれが？</label>
                <select id="select-child" required></select>
            </div>
            <div class="form-group">
                <label for="input-date">いつ？</label>
                <input type="date" id="input-date" required>
            </div>
            
            <div id="wrapper-earn">
                <div class="form-group">
                    <label for="select-job">なにを等？</label>
                    <select id="select-job"></select>
                </div>
            </div>

            <div id="wrapper-spend" style="display: none;">
                <div class="form-group">
                    <label for="input-spend-title">なにに つかった？</label>
                    <input type="text" id="input-spend-title" placeholder="例：お菓子、おもちゃ">
                </div>
                <div class="form-group">
                    <label for="input-spend-amount">いくら つかった？ (円)</label>
                    <input type="number" id="input-spend-amount" min="0" placeholder="0">
                </div>
            </div>

            <button type="submit" id="btn-submit" class="btn-primary" style="margin-top: 10px;">きろくする！</button>
        </form>
    </div>

    <div class="card">
        <h2>グラフであしあとを見る</h2>
        <div style="position: relative; width: 100%; height: 250px; margin-top: 10px;">
            <canvas id="moneyChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h2>せってい（名前・おてつだい）</h2>
        
        <h3>1. 子どものなまえ変更</h3>
        <div class="grid-dynamic" id="name-inputs-container" style="margin-bottom: 15px;"></div>

        <h3>2. お手伝いメニューの追加</h3>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="new-job-name" placeholder="例：お皿洗い">
            <input type="number" id="new-job-price" placeholder="円" style="width: 80px;">
            <button type="button" onclick="addJobSetting()" style="width: auto;">追加</button>
        </div>
        <div class="settings-list" id="job-settings-list"></div>
    </div>

    <div class="card">
        <h2>さいきんのきろく</h2>
        <div class="history-list" id="history-container"></div>
    </div>

    <div class="danger-zone">
        <button type="button" class="btn-clear" onclick="clearAllData()">データをぜんぶリセットする</button>
    </div>

    <script>
        // ⚠️【重要】ここにステップ3で取得したウェブアプリのURLを貼り付けてください！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxaMfqUcdJF1GYTKOjw7LHwThuQWbrYoeslRbeyof3Ntj7PmLuA5-tzDV7cqkXSgbNTPA/exec";

        let state = {
            children: ["子ども1", "子ども2", "子ども3"],
            jobs: [
                { name: "お部屋のそうじ", price: 50 },
                { name: "お皿洗い", price: 30 },
                { name: "ゴミ出し", price: 20 }
            ],
            logs: []
        };

        let currentMode = 'earn'; 
        let myChart = null;

        window.addEventListener('load', async () => {
            // 設定（名前、お手伝い項目）は引き続き端末ごとにローカル保存、または初期値を使用
            const saved = localStorage.getItem('kids_money_pwa_state_settings');
            if (saved) {
                const parsed = JSON.parse(saved);
                state.children = parsed.children || state.children;
                state.jobs = parsed.jobs || state.jobs;
            }
            
            document.getElementById('input-date').value = new Date().toISOString().substring(0, 10);
            
            initNameInputsUI();
            
            // クラウド（スプレッドシート）からログ履歴を取得
            await fetchLogsFromCloud();
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log("SW registered!", reg.scope))
                .catch(err => console.log("SW registration failed", err));
            }
        });

        // スプレッドシートからデータを取ってくる関数
        async function fetchLogsFromCloud() {
            showLoading(true);
            try {
                if(GAS_URL.includes("ここにステップ3")) {
                    showLoading(false);
                    return;
                }
                const response = await fetch(GAS_URL);
                const cloudLogs = await response.json();
                
                // クラウドから取得したデータを日付・ID順にソートしてstateに格納
                state.logs = cloudLogs;
                sortLogs();
                initUI();
            } catch (error) {
                console.error("データ取得エラー:", error);
                alert("インターネットからデータをよみこめませんでした。");
            } finally {
                showLoading(false);
            }
        }

        function sortLogs() {
            state.logs.sort((a, b) => {
                if (b.date !== a.date) {
                    return new Date(b.date) - new Date(a.date);
                }
                return b.id - a.id; 
            });
        }

        function showLoading(bool) {
            document.getElementById('loading-overlay').style.display = bool ? 'flex' : 'none';
        }

        function initNameInputsUI() {
            const container = document.getElementById('name-inputs-container');
            container.innerHTML = '';
            state.children.forEach((name, i) => {
                let input = document.createElement('input');
                input.type = 'text';
                input.id = `name-child${i}`;
                input.value = name || `子ども${i+1}`;
                input.placeholder = `子${i+1}のなまえ`;
                input.addEventListener('change', saveSettings);
                container.appendChild(input);
            });
        }

        function initUI() {
            const selectChild = document.getElementById('select-child');
            selectChild.innerHTML = '';
            state.children.forEach((name, idx) => {
                let opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = name || `子ども${idx+1}`;
                selectChild.appendChild(opt);
            });

            const selectJob = document.getElementById('select-job');
            selectJob.innerHTML = '';
            state.jobs.forEach((job, idx) => {
                let opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `${job.name} (${job.price}円)`;
                selectJob.appendChild(opt);
            });

            const jobList = document.getElementById('job-settings-list');
            jobList.innerHTML = '';
            state.jobs.forEach((job, idx) => {
                let div = document.createElement('div');
                div.className = 'settings-item';
                div.innerHTML = `<span>${job.name} : <strong>${job.price}円</strong></span> 
                                 <button type="button" class="btn-accent" style="width:auto; padding:2px 8px; font-size:0.8rem;" onclick="deleteJobSetting(${idx})">消す</button>`;
                jobList.appendChild(div);
            });

            updateBalances();
            updateHistoryUI();
            renderChart();
        }

        function updateBalances() {
            const balances = Array(state.children.length).fill(0);
            
            state.logs.forEach(log => {
                const idx = parseInt(log.childIdx);
                const amt = parseInt(log.amount);
                if (idx < balances.length) {
                    if(log.type === 'earn') {
                        balances[idx] += amt;
                    } else {
                        balances[idx] -= amt;
                    }
                }
            });

            const container = document.getElementById('kids-status-container');
            container.innerHTML = '';
            state.children.forEach((name, i) => {
                let div = document.createElement('div');
                div.className = 'child-status';
                div.innerHTML = `
                    <div class="child-name-display">${name}</div>
                    <div class="child-money">${balances[i]} 円</div>
                `;
                container.appendChild(div);
            });
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-earn').classList.toggle('active', mode === 'earn');
            document.getElementById('tab-spend').classList.toggle('active', mode === 'spend');
            document.getElementById('wrapper-earn').style.display = mode === 'earn' ? 'block' : 'none';
            document.getElementById('wrapper-spend').style.display = mode === 'spend' ? 'block' : 'none';
        }

        function saveSettings() {
            state.children.forEach((_, i) => {
                state.children[i] = document.getElementById(`name-child${i}`).value.trim() || `子ども${i+1}`;
            });
            // 名前・お手伝い一覧の設定だけ端末ローカルに保存
            localStorage.setItem('kids_money_pwa_state_settings', JSON.stringify({
                children: state.children,
                jobs: state.jobs
            }));
            initUI();
        }

        function addJobSetting() {
            const name = document.getElementById('new-job-name').value.trim();
            const price = parseInt(document.getElementById('new-job-price').value);
            if(!name || isNaN(price)) return alert('内容と金額をいれてね！');
            
            state.jobs.push({ name, price });
            document.getElementById('new-job-name').value = '';
            document.getElementById('new-job-price').value = '';
            saveSettings();
        }

        function deleteJobSetting(idx) {
            state.jobs.splice(idx, 1);
            saveSettings();
        }

        // ログをクラウド（スプレッドシート）に保存する
        async function saveLog(e) {
            e.preventDefault();
            const childIdx = document.getElementById('select-child').value;
            const date = document.getElementById('input-date').value;
            
            if(!date) return alert('日付をいれてね');

            let label = "";
            let amount = 0;

            if(currentMode === 'earn') {
                const jobIdx = document.getElementById('select-job').value;
                if(!state.jobs[jobIdx]) return alert('お手伝いを選んでね');
                label = state.jobs[jobIdx].name;
                amount = state.jobs[jobIdx].price;
            } else {
                label = document.getElementById('input-spend-title').value.trim() || "お買い物";
                amount = parseInt(document.getElementById('input-spend-amount').value);
                if(isNaN(amount) || amount < 0) return alert('正しい金額をいれてね');
            }

            const newLog = {
                id: Date.now(),
                childIdx,
                date,
                type: currentMode,
                label,
                amount
            };

            showLoading(true);
            try {
                // スプレッドシートへ送信
                await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "save", log: newLog })
                });

                // フォームリセット
                if(currentMode === 'spend') {
                    document.getElementById('input-spend-title').value = '';
                    document.getElementById('input-spend-amount').value = '';
                }

                // クラウドから最新状態を再取得
                await fetchLogsFromCloud();
            } catch (error) {
                console.error("保存エラー:", error);
                alert("送信に失敗しました。電波が良いところでやりなおしてね。");
                showLoading(false);
            }
        }

        // ログをクラウドから1件消去する
        async function deleteLog(id) {
            if(confirm('このきろくを消してもいい？')) {
                showLoading(true);
                try {
                    await fetch(GAS_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "delete", id: id })
                    });
                    await fetchLogsFromCloud();
                } catch (error) {
                    console.error("削除エラー:", error);
                    alert("削除に失敗しました。");
                    showLoading(false);
                }
            }
        }

        function updateHistoryUI() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            
            if(state.logs.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888; padding: 10px;">まだきろくはありません</p>';
                return;
            }

            state.logs.forEach((log) => {
                const childName = state.children[log.childIdx] || `子ども${parseInt(log.childIdx)+1}`;
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const isEarn = log.type === 'earn';
                const mark = isEarn ? '＋' : 'ー';
                const color = isEarn ? 'green' : 'red';
                
                div.innerHTML = `
                    <div class="history-left">
                        <div><strong>${log.date.substring(5)}</strong> [${childName}] ${log.label}</div>
                    </div>
                    <div class="history-right">
                        <div style="color:${color}; font-weight:bold;">${mark}${log.amount}円</div>
                        <button type="button" class="btn-accent" style="width:auto; padding:2px 8px; font-size:0.75rem;" onclick="deleteLog(${log.id})">消す</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderChart() {
            const months = [];
            for (let i = 5; i >= 0; i--) {
                let d = new Date();
                d.setMonth(d.getMonth() - i);
                let mStr = d.toISOString().substring(0, 7); 
                months.push(mStr);
            }

            const earnData = Array.from({length: state.children.length}, () => Array(6).fill(0));
            const spendData = [0,0,0,0,0,0];

            state.logs.forEach(log => {
                const mIdx = months.indexOf(log.date.substring(0, 7));
                if(mIdx !== -1) {
                    const cIdx = parseInt(log.childIdx);
                    if (cIdx < state.children.length) {
                        if(log.type === 'earn') {
                            earnData[cIdx][mIdx] += log.amount;
                        } else {
                            spendData[mIdx] += log.amount;
                        }
                    }
                }
            });

            const ctx = document.getElementById('moneyChart').getContext('2d');
            if (myChart) { myChart.destroy(); }

            const baseColors = ['#ffa07c', '#4ecdc4', '#ffda79', '#95a5a6', '#a55eea'];
            const datasets = [];
            
            state.children.forEach((name, i) => {
                datasets.push({
                    label: `${name} (おてつだい)`,
                    data: earnData[i],
                    backgroundColor: baseColors[i % baseColors.length],
                    borderWidth: 2,
                    borderColor: '#4a4a4a',
                    type: 'bar',
                    stack: 'earn'
                });
            });

            datasets.push({
                label: 'みんなのつかった分',
                data: spendData,
                backgroundColor: '#ff6b6b',
                borderWidth: 2,
                borderColor: '#4a4a4a',
                type: 'bar'
            });

            myChart = new Chart(ctx, {
                data: {
                    labels: months.map(m => m.replace('-','年') + '月'),
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { font: { family: 'M PLUS Rounded 1c', weight: 'bold' } } }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { font: { family: 'M PLUS Rounded 1c' } } },
                        x: { ticks: { font: { family: 'M PLUS Rounded 1c' } } }
                    }
                }
            });
        }

        // クラウドのデータを全件リセットする
        async function clearAllData() {
            if(confirm('本当におこづかいのデータをクラウドも含めてぜんぶ消してもいい？')) {
                showLoading(true);
                try {
                    await fetch(GAS_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "clear" })
                    });
                    localStorage.removeItem('kids_money_pwa_state_settings');
                    state.logs = [];
                    initUI();
                    if(myChart) myChart.destroy();
                    alert('すべてリセットしました！');
                } catch (error) {
                    console.error("リセットエラー:", error);
                    alert("リセットに失敗しました。");
                } finally {
                    showLoading(false);
                }
            }
        }
    </script>
</body>
</html>
